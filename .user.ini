default_charset="utf-8"
disable_functions="exec,system"
display_errors="off"
log_errors="on"
error_log="/wp-content/debug.log"
expose_php="off"
include_path="/var/www/monsite.fr/etc."
date.timezone="Europe/Paris"
auto_prepend_file=".htaccess"
auto_append_file="header.php"
magic_quotes_gpc="off"
max_execution_time="10"
memory_limit="1024M"
output_buffering="off"
php_displayerr="off"
php_globals="on"
php_gpc="off"
php_url_fopen="off"
register_globals="off"
safe_mode="off"
session.auto_start="1"
session.cache_expire="30"
session.cache_limiter="private"
session.cookie_domain=""
session.cookie_httponly="0"
session.cookie_lifetime="0"
session.cookie_path="/var/www/monsite.fr/etc."
session.cookie_samesite="Strict"
session.cookie_secure="on"
session.gc_divisor="100"
session.gc_maxlifetime="0"
session.gc_probability="1"
session.hash_function="sha512"
session.lazy_write="0"
session.name="PHPSESSID"
session.referer_check=""
session.save_handler="files"
session.save_path="/var/www/monsite.fr/etc."
session.serialize_handler="php"
session.sid_bits_per_character="6"
session.sid_length="256"
session.trans_sid_tags="a=href,area=href,frame=src,input=src"
session.upload_progress.cleanup="1"
session.upload_progress.enabled="1"
session.upload_progress.freq="25%"
session.upload_progress.min_freq="5"
session.upload_progress.name="sql_PHP_SESSION_PROGRESS"
session.upload_progress.prefix="sql_progress_"
session.use_cookies="1"
session.use_only_cookies="1"
session.use_strict_mode="1"
session.use_trans_sid="0"
zlib.output_compression="0"
zlib.output_compression_level="0"
